<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>FresherWay | Company Dashboard</title>

    <link rel="stylesheet"
          href="css/company-dashboard.css">

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<!-- ================= NAVBAR ================= -->

<nav>

    <div class="logo">

        <i class="fa-solid fa-building"></i>

        FresherWay

    </div>

    <div class="nav-right">

        <span id="companyName">

            Welcome Company

        </span>

        <button
                class="logout-btn"
                onclick="logout()">

            Logout

        </button>

    </div>

</nav>

<!-- ================= COMPANY INFO ================= -->

<section class="company-card">

    <h2>

        Company Information

    </h2>

    <div class="input-group">

        <label>Company Name</label>

        <input
                type="text"
                id="companyNameInput">

    </div>

    <div class="input-group">

        <label>Website</label>

        <input
                type="text"
                id="website">

    </div>

    <div class="input-group">

        <label>Location</label>

        <input
                type="text"
                id="location">

    </div>

    <div class="input-group">

        <label>Description</label>

        <textarea
                id="description"
                rows="4">

        </textarea>

    </div>

    <button
            class="save-btn"
            onclick="saveCompany()">

        Save Company

    </button>

</section>

<!-- ================= POST JOB ================= -->

<section class="job-card">

    <h2>

        Post New Job

    </h2>

    <div class="input-group">

        <label>Job Title</label>

        <input
                type="text"
                id="jobTitle">

    </div>

    <div class="input-group">

        <label>Salary</label>

        <input
                type="number"
                id="salary">

    </div>

    <div class="input-group">

        <label>Location</label>

        <input
                type="text"
                id="jobLocation">

    </div>

    <div class="input-group">

        <label>Skills Required</label>

        <input
                type="text"
                id="skills">

    </div>

    <div class="input-group">

        <label>Description</label>

        <textarea
                id="jobDescription"
                rows="5">

        </textarea>

    </div>

    <button
            class="post-btn"
            onclick="postJob()">

        Post Job

    </button>

</section>

<!-- ================= MY JOBS ================= -->

<section class="jobs-section">

    <h2>

        My Posted Jobs

    </h2>

    <div id="jobsContainer">

    </div>

</section>

<script src="js/company-dashboard.js"></script>

</body>

</html>
